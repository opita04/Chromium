<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudiobookBay Downloader</title>
    <style>
        body {
            width: 400px;
            min-height: 300px;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #6a1b9a, #8e24aa);
            color: white;
        }
        
        .header {
            padding: 20px;
            text-align: center;
            background: rgba(0, 0, 0, 0.1);
        }
        
        .header h1 {
            margin: 0 0 5px 0;
            font-size: 18px;
            font-weight: 600;
        }
        
        .header p {
            margin: 0;
            font-size: 12px;
            opacity: 0.8;
        }
        
        .search-section {
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .search-section h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            font-weight: 600;
        }
        
        .search-container {
            display: flex;
            gap: 8px;
        }
        
        .search-input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            background: white;
            color: #333;
        }
        
        .search-input:focus {
            outline: 2px solid rgba(255, 255, 255, 0.5);
            outline-offset: -2px;
        }
        
        .search-btn {
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            color: white;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.3s;
        }
        
        .search-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .search-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .results-section {
            padding: 15px 20px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .results-header h3 {
            margin: 0;
            font-size: 14px;
            font-weight: 600;
        }
        
        .results-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .results-count {
            font-size: 11px;
            opacity: 0.8;
        }
        
        .clear-results-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 4px 6px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.3s;
        }
        
        .clear-results-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .result-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 8px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            transition: background 0.3s;
        }
        
        .result-item:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        
        .result-cover {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }
        
        .result-info {
            flex: 1;
            min-width: 0;
        }
        
        .result-title {
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 4px;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .result-domain {
            font-size: 10px;
            opacity: 0.6;
            margin-bottom: 6px;
        }
        
        .result-actions {
            display: flex;
            gap: 4px;
        }
        
        .result-btn {
            padding: 4px 8px;
            font-size: 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .result-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .result-btn.download {
            background: #4caf50;
            border-color: #4caf50;
        }
        
        .result-btn.download:hover {
            background: #45a049;
        }
        
        .no-results {
            text-align: center;
            padding: 30px 20px;
            opacity: 0.7;
            font-size: 13px;
        }
        
        .loading {
            text-align: center;
            padding: 30px 20px;
            opacity: 0.8;
        }
        
        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .footer {
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 8px;
            justify-content: space-between;
        }
        
        .footer-btn {
            flex: 1;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            color: white;
            cursor: pointer;
            font-size: 11px;
            text-align: center;
            text-decoration: none;
            transition: background 0.3s;
        }
        
        .footer-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .status-indicator {
            padding: 8px 15px;
            margin: 10px 0;
            border-radius: 4px;
            font-size: 12px;
            text-align: center;
            display: none;
        }
        
        .status-success {
            background: rgba(76, 175, 80, 0.3);
            border: 1px solid rgba(76, 175, 80, 0.5);
        }
        
        .status-error {
            background: rgba(244, 67, 54, 0.3);
            border: 1px solid rgba(244, 67, 54, 0.5);
        }
        
        .quality-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 8px;
            font-size: 9px;
            font-weight: 500;
            margin-left: 4px;
            background: rgba(255, 255, 255, 0.2);
        }
        
        .quality-high { background: #2196f3; }
        .quality-lossless { background: #9c27b0; }
        .quality-good { background: #4caf50; }
        .quality-standard { background: #ff9800; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎧 AudiobookBay</h1>
        <p>Quick Search & Download</p>
    </div>
    
    <div class="search-section">
        <h3>🔍 Search Audiobooks</h3>
        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder="Enter book title or author..." />
            <button class="search-btn" id="searchBtn">Search</button>
        </div>
        <div class="status-indicator" id="statusIndicator"></div>
    </div>
    
    <div class="results-section" id="resultsSection" style="display: none;">
        <div class="results-header">
            <h3>📚 Results</h3>
            <div class="results-controls">
                <span class="results-count" id="resultsCount"></span>
                <button class="clear-results-btn" id="clearResultsBtn" title="Clear cached results">🗑️</button>
            </div>
        </div>
        <div id="resultsContainer"></div>
    </div>
    
    <div class="no-results" id="noResults" style="display: none;">
        <p>🤔 No audiobooks found</p>
        <p style="font-size: 11px; opacity: 0.6;">Try different search terms or check your configured domains in settings</p>
    </div>
    
    <div class="info-message" id="infoMessage" style="display: none;">
        <p style="font-size: 11px; opacity: 0.8; text-align: center; margin: 10px 0;">
            💾 Results are saved - they'll be here when you reopen the popup!
        </p>
    </div>
    
    <div class="loading" id="loading" style="display: none;">
        <div class="spinner"></div>
        <p>Searching across domains...</p>
    </div>
    
    <div class="footer">
        <a href="#" class="footer-btn" id="settingsBtn">⚙️ Settings</a>
        <a href="#" class="footer-btn" id="statusBtn">📊 Status</a>
        <a href="#" class="footer-btn" id="helpBtn">❓ Help</a>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
