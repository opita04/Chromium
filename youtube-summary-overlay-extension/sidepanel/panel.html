<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YouTube Summary</title>
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <main>
    <header>
      <div>
        <p class="eyebrow">YouTube → Obsidian</p>
        <h1>Summary Side Panel</h1>
      </div>
      <button id="loadBtn" type="button">Load transcript</button>
    </header>

    <section class="card meta">
      <label for="model">OpenRouter model</label>
      <input id="model" type="text" value="mistralai/mistral-nemo" spellcheck="false">
      <p class="hint">Default: Mistral Nemo. Click any model below to redo this transcript with that model.</p>
      <div class="model-buttons" aria-label="Model presets">
        <button type="button" class="model-btn" data-model="deepseek/deepseek-v4-flash">DeepSeek Flash</button>
        <button type="button" class="model-btn secondary" data-model="qwen/qwen3.6-flash">Qwen Flash</button>
        <button type="button" class="model-btn secondary" data-model="google/gemini-2.5-flash-lite">Gemini Lite</button>
        <button type="button" class="model-btn secondary" data-model="mistralai/mistral-nemo">Mistral Nemo</button>
        <button type="button" class="model-btn secondary" data-model="openrouter/free">Free Route</button>
        <button type="button" class="model-btn secondary" data-model="openai/gpt-5-nano">GPT-5 Nano</button>
      </div>
    </section>

    <section class="card status-card">
      <div id="status">Open a YouTube video, then click “Load transcript”.</div>
      <progress id="progress" hidden></progress>
    </section>

    <section id="videoCard" class="card" hidden>
      <h2 id="videoTitle"></h2>
      <p id="videoChannel"></p>
      <p id="transcriptStats"></p>
      <div class="actions">
        <button id="summarizeBtn" type="button">Summarize + save</button>
        <button id="copyTranscriptBtn" type="button" class="secondary">Copy transcript</button>
      </div>
    </section>

    <section id="summaryCard" class="card" hidden>
      <div class="summary-header">
        <h2>Summary</h2>
        <button id="saveMarkdownBtn" type="button" class="secondary">Save again</button>
      </div>
      <div class="category-row">
        <label for="category">Save folder</label>
        <select id="category">
          <option value="Political">Political</option>
          <option value="Coding">Coding</option>
          <option value="Educational">Educational</option>
          <option value="General">General</option>
          <option value="Business">Business</option>
          <option value="AI">AI</option>
          <option value="Finance">Finance</option>
          <option value="Health">Health</option>
          <option value="Science">Science</option>
          <option value="Others">Others</option>
        </select>
        <button id="moveCategoryBtn" type="button" class="secondary">Move to folder</button>
      </div>
      <p class="hint">If the auto-category is wrong, pick a folder and click “Move to folder”.</p>
      <p id="savedPath" class="path"></p>
      <textarea id="summary" spellcheck="false"></textarea>
    </section>
  </main>
  <script src="panel.js"></script>
</body>
</html>
