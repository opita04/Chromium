<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            width: 200px;
            padding: 1rem;
            font-family: 'Outfit', sans-serif;
            background: #0f0f14;
            color: #fff;
            text-align: center;
        }

        h2 {
            font-size: 1rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 0.8rem;
            opacity: 0.8;
        }
    </style>
</head>

<body>
    <h2>TS Sorter</h2>
    <p>Refresh the page to see the sorting panel.</p>

</html>
